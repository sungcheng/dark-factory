name: Auto Version

on:
  push:
    branches: [main]

concurrency:
  group: auto-version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip our own bump commits to prevent loops. release.yml runs
    # separately on the bump commit and handles tagging + releasing.
    if: "!contains(github.event.head_commit.message, 'chore: bump version to')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run auto-version
        id: bump
        run: |
          output=$(python scripts/auto_version.py)
          echo "$output"
          if echo "$output" | grep -q "^BUMPED:"; then
            new_version=$(echo "$output" | sed -n 's/^BUMPED: .* -> \([^ ]*\) .*/\1/p')
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=$new_version" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add factory/__init__.py CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push origin main
