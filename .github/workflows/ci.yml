name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Install dashboard frontend dependencies
        run: cd dashboard/frontend && npm ci

      - name: Lint
        run: uv run ruff check factory/ tests/

      - name: Format check
        run: uv run ruff format --check factory/ tests/

      - name: Tests
        run: uv run pytest tests/ -v --tb=short
