name: Auto Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get version from __init__.py
        id: version
        run: |
          VERSION=$(python -c "import re; print(re.search(r'__version__\s*=\s*\"(.+?)\"', open('factory/__init__.py').read()).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          python -c "
          import re
          content = open('CHANGELOG.md').read()
          version = '${{ steps.version.outputs.version }}'
          pattern = rf'## \[{re.escape(version)}\].*?\n(.*?)(?=\n## \[|$)'
          match = re.search(pattern, content, re.DOTALL)
          body = match.group(1).strip() if match else 'Release v' + version
          # Write to file to handle multiline
          open('/tmp/release_body.md', 'w').write(body)
          "
          echo "body_file=/tmp/release_body.md" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Dark Factory ${{ steps.version.outputs.tag }}" \
            --notes-file "${{ steps.changelog.outputs.body_file }}"
